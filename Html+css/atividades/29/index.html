<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website Design - GreatStack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-1">
                <img src="img/7.jpeg" class="logo">
                <div class="content">
                    <h1>EXPLORE</h1>
                    <p>This is the best place to find your next adventure. Enjoy the beauty of nature with us.</p>
                    <button type="button">Learn More</button>
                </div>
            </div>
            <div class="col-2">
                <div class="slider">
                    <img src="img/8.jpeg" id="slideImg">
                    <div class="slider-content">
                        <h2>NATURE</h2>
                        <hr>
                        <p>Beautiful landscapes and fresh air.</p>
                        <div class="controls">
                            <img src="img/4.jpeg" id="backBtn">
                            <div class="vertical-line"></div>
                            <img src="img/5.jpeg" id="nextBtn">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header" id="backImg">
        <nav>
            <img src="img/5.jpeg" class="logo">
            <div>
                <button type="button">Login</button>
                <img src="img/11.jpeg" class="user-icon">
            </div>
        </nav>

        <div class="container">
            <div class="info">
                <h1>EXPLORE</h1>
                <p>This is the best place to find your next adventure. Enjoy the beauty of nature with us.</p>
                <input type="text" placeholder="Search">
            </div>
        </div>

        <div class="slider">
            <div class="thumbnails">
                <img src="img/2.jpeg" class="thumbnail active">
                <img src="img/3.jpeg" class="thumbnail">
                <img src="img/4.jpeg" class="thumbnail">
                <img src="img/7.jpeg" class="thumbnail">
                <img src="img/6.jpeg" class="thumbnail">
            </div>
            <div class="navigation">
                <img src="img/r.png" id="prev">
                <img src="img/l.png" id="next">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Card Design </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="title">
        <h1>Flip Card</h1>
        <p>Passe o mouse sobre o cartão para ver os detalhes.</p>
    </div>

    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="img/poco x7 pro.png" style="width:100%; height:100%;">
            </div>
            <div class="flip-card-back">
                <div class="back-header">
                    <img src="img/poco x7 pro.png">
                </div>
                <div class="back-footer">
                    <h2>Smart Phone</h2>
                    <p>Processador MediaTek Dimensity 8400-Ultra,8 ou 12GB RAM, Câmera 50MP ou 4k.</p>
                    <p><i class="fa fa-inr"></i> 2.100,00</p>
                    <div class="stars">
                        <i class="fa fa-star"></i>
                        <i class="fa fa-star"></i>
                        <i class="fa fa-star"></i>
                        <i class="fa fa-star"></i>
                        <i class="fa fa-star-half-o"></i>
                    </div>
                    <div class="btn-box">
                        <a href="#">Visitar</a>
                        <a href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
